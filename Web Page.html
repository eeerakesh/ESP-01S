<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=yes, viewport-fit=cover">
  <meta name="theme-color" content="#667eea">
  <title>ESP-01S Relay – Firebase Control</title>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
  background:linear-gradient(135deg,#667eea,#764ba2);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:16px;
}

/* CARD */
.card{
  background:#fff;
  border-radius:24px;
  padding:22px 18px;
  width:100%;
  max-width:500px;
  box-shadow:0 15px 30px rgba(0,0,0,0.2);
}

/* LOGIN */
.login-card h2{
  text-align:center;
  margin-bottom:18px;
}

.form-group{margin-bottom:14px}
.form-group label{font-size:.85rem;font-weight:600}

.form-group input{
  width:100%;
  padding:13px;
  border-radius:16px;
  border:2px solid #e2e8f0;
  font-size:1rem;
}

.password-wrapper{position:relative}
.password-wrapper input{padding-right:45px}

.toggle-password{
  position:absolute;
  right:12px;
  top:50%;
  transform:translateY(-50%);
  border:none;
  background:none;
  font-size:1.2rem;
  cursor:pointer;
}

.btn-primary{
  width:100%;
  padding:14px;
  border:none;
  border-radius:30px;
  background:#4CAF50;
  color:#fff;
  font-weight:bold;
  margin-top:10px;
}

/* DASHBOARD */
.dashboard-card h1{
  text-align:center;
  margin-bottom:14px;
  font-size:1.4rem;
}

.status-badge{
  padding:6px 12px;
  border-radius:20px;
  font-size:.8rem;
  margin:4px;
}

.wifi-ok,.fb-ok{
  background:#4CAF50;
  color:#fff;
}

.relay-box{
  background:#f1f5f9;
  border-radius:30px;
  padding:18px;
  margin:16px 0;
}

.relay-state{
  text-align:center;
  font-size:48px;
  padding:16px;
  border-radius:30px;
  font-weight:bold;
}

.on{background:#4CAF50;color:#fff}
.off{background:#f44336;color:#fff}

.btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:28px;
  margin-top:10px;
  font-weight:600;
  color:#fff;
  background:#2196F3;
}

.config{background:#FF9800}
.logout-link{background:#dc2626}

.info{
  background:#f1f5f9;
  border-radius:16px;
  padding:12px;
  font-size:13px;
}

/* SETTINGS */
.settings-card input{
  width:100%;
  padding:12px;
  border-radius:14px;
  border:2px solid #e2e8f0;
  margin-bottom:12px;
}

.btn-group{
  display:flex;
  gap:10px;
}

.save{background:#4CAF50}
.back{background:#3b82f6}

/* UTIL */
.hidden{display:none}

footer{
  position:fixed;
  bottom:5px;
  width:100%;
  text-align:center;
  font-size:.65rem;
  color:#fff;
}

/* MOBILE */
@media(max-width:480px){
  body{align-items:flex-start;padding-top:20px}
  .relay-state{font-size:40px}
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginView" class="card login-card">
  <h2>🔐 Firebase Login</h2>

  <div class="form-group">
    <label>Email</label>
    <input id="email" type="email">
  </div>

  <div class="form-group">
    <label>Password</label>
    <div class="password-wrapper">
      <input id="password" type="password">
      <button class="toggle-password" onclick="togglePassword(event)">👁️</button>
    </div>
  </div>

  <button class="btn-primary" onclick="manualLogin()">Login</button>
  <div id="loginError" style="color:red;font-size:12px;text-align:center"></div>
</div>

<!-- DASHBOARD -->
<div id="dashboardView" class="card dashboard-card hidden">
  <h1>🔌 Relay Control</h1>

  <div>
    <span class="status-badge wifi-ok">WiFi</span>
    <span class="status-badge fb-ok">FB</span>
  </div>

  <div class="relay-box">
    <div id="relayStateDisplay" class="relay-state off">OFF</div>
    <button id="toggleRelayBtn" class="btn" onclick="toggleRelay()">Turn ON</button>
    <button class="btn config" onclick="showSettings()">Settings</button>
  </div>

  <div class="info">
    UID: S4gaehihC8dC52Pibr8pClkrEis2
  </div>

  <button class="btn logout-link" onclick="manualLogout()">Logout</button>
</div>

<!-- SETTINGS -->
<div id="settingsView" class="card settings-card hidden">
  <h1>⚙️ Settings</h1>

  <form action="/save" method="POST">
    <input name="ssid" value="J5G">
    <input name="password" value="Yellow123*">
    <input name="api_key" value="AIzaSyBwZ1Uucjpp7A4eCY6nYwmS1ZfS89JV83c">
    <input name="database_url" value="https://ch-relay-215e3-default-rtdb.asia-southeast1.firebasedatabase.app">
    <input name="user_email" value="eee.rakesh@gmail.com">
    <input name="user_password" value="Yellow123*">

    <div class="btn-group">
      <button class="btn save">Save</button>
      <button type="button" class="btn back" onclick="showDashboard()">Back</button>
    </div>
  </form>
</div>

<footer>ESP-01S Firebase Relay</footer>

<script>
const firebaseConfig={
apiKey:"AIzaSyBwZ1Uucjpp7A4eCY6nYwmS1ZfS89JV83c",
authDomain:"ch-relay-215e3.firebaseapp.com",
databaseURL:"https://ch-relay-215e3-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"ch-relay-215e3"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();
const auth=firebase.auth();

const UID="S4gaehihC8dC52Pibr8pClkrEis2";

let currentUser=null;
let relayState=false;

/* PASSWORD FIX */
function togglePassword(e){
  e.preventDefault();
  const p=document.getElementById("password");
  p.type=p.type==="password"?"text":"password";
}

/* LOGIN */
async function manualLogin(){
  const email=document.getElementById("email").value;
  const pass=document.getElementById("password").value;

  try{
    await auth.signOut();
    const u=await auth.signInWithEmailAndPassword(email,pass);
    currentUser=u.user;
    showDashboard();
  }catch(err){
    document.getElementById("loginError").innerText=err.message;
  }
}

/* LOGOUT */
async function manualLogout(){
  await auth.signOut();
  currentUser=null;
  showLogin();
}

/* RELAY */
function toggleRelay(){
  relayState=!relayState;
  db.ref("/"+UID+"/relay").set(relayState);
  updateUI();
}

function updateUI(){
  const el=document.getElementById("relayStateDisplay");
  const btn=document.getElementById("toggleRelayBtn");

  if(relayState){
    el.innerText="ON";
    el.className="relay-state on";
    btn.innerText="Turn OFF";
  }else{
    el.innerText="OFF";
    el.className="relay-state off";
    btn.innerText="Turn ON";
  }
}

/* LISTENER */
db.ref("/"+UID+"/relay").on("value",s=>{
  relayState=s.val()===true;
  updateUI();
});

/* VIEW */
function showDashboard(){
  document.getElementById("loginView").classList.add("hidden");
  document.getElementById("dashboardView").classList.remove("hidden");
  document.getElementById("settingsView").classList.add("hidden");
}

function showSettings(){
  document.getElementById("dashboardView").classList.add("hidden");
  document.getElementById("settingsView").classList.remove("hidden");
}

function showLogin(){
  document.getElementById("loginView").classList.remove("hidden");
  document.getElementById("dashboardView").classList.add("hidden");
  document.getElementById("settingsView").classList.add("hidden");
}

/* INIT */
auth.signOut();
showLogin();
</script>

</body>
</html>
